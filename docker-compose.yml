version: "3.9"

services:
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__API__AUTH_BACKEND: 'airflow.api.auth.backend.basic_auth'
      AIRFLOW__CORE__FERNET_KEY: 'ezN0VbZaIlcTc0WWOy6lA0PAOTRC4n5gFrU-COPFWPI='
      DATABASE_URL: sqlite:////opt/airflow/airflow.db
      PORT: 8080
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./Emploi_senegal:/opt/scrapy_project
    ports:
      - "8080:8080"
    command: bash /start.sh webserver
    networks:
      - emploi_network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__API__AUTH_BACKEND: 'airflow.api.auth.backend.basic_auth'
      AIRFLOW__CORE__FERNET_KEY: 'ezN0VbZaIlcTc0WWOy6lA0PAOTRC4n5gFrU-COPFWPI='
      DATABASE_URL: sqlite:////opt/airflow/airflow.db
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./Emploi_senegal:/opt/scrapy_project
    command: bash /start.sh scheduler
    depends_on:
      - airflow-webserver
    networks:
      - emploi_network


networks:
  emploi_network:
    driver: bridge
